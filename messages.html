<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Messages — RPAS</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&amp;display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --gold: #f5c200;
        --gold-light: #fef3c7;
        --gold-dark: #d4a800;
        --green: #1a6b30;
        --green-light: #e8f5ed;
        --green-dark: #145525;
        --gray-50: #f9fafb;
        --gray-100: #f3f4f6;
        --gray-200: #e5e7eb;
        --gray-300: #d1d5db;
        --gray-400: #9ca3af;
        --gray-500: #6b7280;
        --gray-600: #4b5563;
        --gray-700: #374151;
        --gray-800: #1f2937;
        --gray-900: #111827;
        --danger: #dc2626;
        --danger-light: #fee2e2;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "DM Sans", sans-serif;
        background: var(--gray-50);
        color: var(--gray-800);
        height: 100vh;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* TOPBAR */
      .topbar {
        height: 60px;
        background: white;
        border-bottom: 1px solid var(--gray-200);
        display: flex;
        align-items: center;
        padding: 0 20px;
        gap: 16px;
        flex-shrink: 0;
        position: sticky;
        top: 0;
        z-index: 100;
      }
      .topbar-back {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: none;
        background: var(--gray-100);
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--gray-600);
      }
      .topbar-back:hover {
        background: var(--gray-200);
      }
      .topbar h2 {
        font-size: 18px;
        font-weight: 700;
        color: var(--green-dark);
        font-family: "DM Sans", sans-serif;
      }
      .topbar-user {
        margin-left: auto;
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .topbar-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        background: var(--gold-light);
        color: var(--green-dark);
        font-weight: 700;
        font-size: 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      /* MAIN LAYOUT */
      .messages-layout {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* TABS (left sidebar on desktop, top tabs on mobile) */
      .msg-sidebar {
        width: 280px;
        background: white;
        border-right: 1px solid var(--gray-200);
        display: flex;
        flex-direction: column;
        flex-shrink: 0;
        overflow: hidden;
      }
      .msg-tabs {
        display: flex;
        border-bottom: 1px solid var(--gray-200);
        flex-shrink: 0;
      }
      .msg-tab {
        flex: 1;
        padding: 14px 8px;
        font-size: 12px;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        border: none;
        background: none;
        color: var(--gray-500);
        border-bottom: 2px solid transparent;
        transition: all 0.15s;
        white-space: nowrap;
      }
      .msg-tab.active {
        color: var(--green);
        border-bottom-color: var(--green);
      }
      .msg-tab:hover {
        background: var(--gray-50);
      }
      .msg-list {
        flex: 1;
        overflow-y: auto;
      }

      /* Conversation item */
      .conv-item {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--gray-100);
        cursor: pointer;
        transition: background 0.1s;
        width: 100%;
        background: none;
        border-left: none;
        border-right: none;
        border-top: none;
        text-align: left;
      }
      .conv-item:hover {
        background: var(--gray-50);
      }
      .conv-item.active {
        background: var(--green-light);
      }
      .conv-item.unread .conv-name {
        font-weight: 700;
      }
      .conv-item.unread .conv-preview {
        color: var(--gray-700);
      }
      .conv-avatar {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--gold-light);
        color: var(--green-dark);
        font-weight: 700;
        font-size: 16px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        overflow: hidden;
      }
      .conv-info {
        flex: 1;
        min-width: 0;
      }
      .conv-name {
        font-size: 14px;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .conv-service {
        font-size: 11px;
        color: var(--gray-400);
        margin-top: 1px;
      }
      .conv-preview {
        font-size: 12px;
        color: var(--gray-500);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 3px;
      }
      .conv-meta {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 4px;
        flex-shrink: 0;
      }
      .conv-time {
        font-size: 11px;
        color: var(--gray-400);
      }
      .conv-unread-dot {
        width: 8px;
        height: 8px;
        background: var(--green);
        border-radius: 50%;
      }
      .conv-empty {
        text-align: center;
        padding: 40px 20px;
        color: var(--gray-400);
        font-size: 14px;
      }

      /* CHAT AREA */
      .chat-area {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: white;
      }
      .chat-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--gray-200);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        background: white;
      }
      .chat-header-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: var(--gold-light);
        color: var(--green-dark);
        font-weight: 700;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        overflow: hidden;
      }
      .chat-header-info h4 {
        font-size: 15px;
        font-weight: 700;
      }
      .chat-header-info span {
        font-size: 12px;
        color: var(--gray-500);
      }
      .chat-empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        color: var(--gray-400);
        gap: 12px;
      }
      .chat-empty-state div:first-child {
        font-size: 48px;
      }
      .chat-empty-state p {
        font-size: 14px;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .chat-msg-row {
        display: flex;
        align-items: flex-end;
        gap: 8px;
      }
      .chat-msg-row.mine {
        flex-direction: row-reverse;
      }
      .chat-msg-bubble {
        max-width: 70%;
        padding: 10px 14px;
        border-radius: 16px;
        font-size: 14px;
        line-height: 1.5;
        word-break: break-word;
      }
      .chat-msg-row.mine .chat-msg-bubble {
        background: var(--green-dark);
        color: white;
        border-bottom-right-radius: 4px;
      }
      .chat-msg-row.theirs .chat-msg-bubble {
        background: var(--gray-100);
        color: var(--gray-800);
        border-bottom-left-radius: 4px;
      }
      .chat-msg-time {
        font-size: 11px;
        color: var(--gray-400);
        margin-bottom: 2px;
      }
      .chat-date-divider {
        text-align: center;
        font-size: 11px;
        color: var(--gray-400);
        margin: 8px 0;
      }
      .chat-input-bar {
        padding: 12px 20px;
        border-top: 1px solid var(--gray-200);
        display: flex;
        gap: 10px;
        align-items: center;
        flex-shrink: 0;
        background: white;
      }
      .chat-input-bar textarea {
        flex: 1;
        border: 1px solid var(--gray-200);
        border-radius: 12px;
        padding: 10px 14px;
        font-size: 14px;
        font-family: inherit;
        outline: none;
        resize: none;
        max-height: 100px;
        line-height: 1.4;
      }
      .chat-input-bar textarea:focus {
        border-color: var(--green);
      }
      .chat-send-btn {
        width: 42px;
        height: 42px;
        border-radius: 50%;
        background: var(--green-dark);
        color: white;
        border: none;
        cursor: pointer;
        font-size: 18px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .chat-send-btn:hover {
        background: var(--green);
      }
      .chat-send-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      /* ALDER TAB */
      .alder-tab-header {
        padding: 16px 20px;
        border-bottom: 1px solid var(--gray-200);
        display: flex;
        align-items: center;
        gap: 12px;
        flex-shrink: 0;
        background: white;
      }
      .alder-tab-avatar {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* LOADING */
      .loading-spinner {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
        color: var(--gray-400);
        font-size: 14px;
        gap: 10px;
      }

      /* Alder bubble fixed */
      .alder-bubble {
        position: fixed;
        bottom: 20px;
        right: 20px;
        z-index: 3000;
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 12px;
      }
      .alder-face-btn {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        border: 3px solid #f5c200;
        background: #1a6b30;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.25);
        animation: alderIdle 3s ease-in-out infinite;
        flex-shrink: 0;
      }
      .alder-face-btn:hover {
        transform: scale(1.08);
        animation: none;
      }
      @keyframes alderIdle {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-3px);
        }
      }
      .alder-face-svg {
        width: 34px;
        height: 34px;
      }

      /* Mobile responsive */
      @media (max-width: 640px) {
        .msg-sidebar {
          width: 100%;
          border-right: none;
          border-bottom: 1px solid var(--gray-200);
          max-height: 240px;
        }
        .messages-layout {
          flex-direction: column;
        }
        .chat-area {
          min-height: 0;
        }
      }
    </style>
  </head>
  <body>
    <!-- TOPBAR -->
    <div class="topbar">
      <button class="topbar-back" onclick="history.back()" title="Back">
        ←
      </button>
      <h2>Messages</h2>
      <div class="topbar-user">
        <div class="topbar-avatar" id="topbar-avatar">
          <img
            src="https://wkgacywvsndwiezqdcxj.supabase.co/storage/v1/object/public/attachments/avatars/259e98b8-1208-4307-a0f0-f92fec3aaaa2.jpg"
            style="
              width: 100%;
              height: 100%;
              object-fit: cover;
              border-radius: 50%;
            "
          />
        </div>
      </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div class="messages-layout">
      <!-- LEFT SIDEBAR: tabs + conversation list -->
      <div class="msg-sidebar">
        <div class="msg-tabs">
          <button
            class="msg-tab"
            id="tab-requests"
            onclick="switchTab('requests')"
          >
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              style="margin-right: 4px; vertical-align: middle"
            >
              <path
                d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"
              ></path></svg
            >My Requests
          </button>
          <button class="msg-tab" id="tab-office" onclick="switchTab('office')">
            <svg
              width="14"
              height="14"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              style="margin-right: 4px; vertical-align: middle"
            >
              <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
              <polyline points="9 22 9 12 15 12 15 22"></polyline></svg
            >RPAS Office
          </button>
          <button
            class="msg-tab active"
            id="tab-alder"
            onclick="switchTab('alder')"
          >
            <img
              src="/assets/Alder/alder-head.png"
              style="width: 20px; height: auto; vertical-align: middle"
              onerror="this.style.display = 'none'"
            />
            Ask Alder
          </button>
        </div>
        <div class="msg-list" id="msg-list">
          <div
            class="conv-empty"
            style="
              padding: 24px 16px;
              text-align: center;
              color: var(--gray-500);
              font-size: 13px;
            "
          >
            🦁 Alder is in the chat area →
          </div>
        </div>
      </div>

      <!-- RIGHT: chat area -->
      <div class="chat-area" id="chat-area">
        <div class="alder-tab-header">
          <div class="alder-tab-avatar">
            <img
              src="/assets/Alder/alder-head.png"
              alt="Alder head"
              style="width: 50px; height: auto; display: block"
            />
          </div>
          <div>
            <h4 style="font-size: 15px; font-weight: 700">Alder</h4>
            <span style="font-size: 12px; color: var(--gray-500)"
              >RPAS AI Assistant • ACI</span
            >
          </div>
        </div>
        <div class="chat-messages" id="alder-msgs-full">
          <div class="chat-msg-row theirs">
            <div class="chat-msg-bubble">
              Hi! I'm Alder, your RPAS assistant 🦁 I can answer questions about
              our services, check your request status, or connect you with the
              admin. What can I help you with today?
            </div>
          </div>
        </div>
        <div class="chat-input-bar">
          <textarea
            id="alder-input-full"
            rows="1"
            placeholder="Ask Alder anything..."
            onkeydown="alderKeyFull(event)"
          ></textarea
          ><button
            class="chat-send-btn"
            onclick="sendAlderFull()"
            id="alder-send-full"
          >
            ➤
          </button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="assets/js/supabase.js"></script>
    <script src="auth.js"></script>
    <script>
      var profile = null;
      var activeTab = "requests";
      var activeConvId = null;
      var allConvs = [];
      var alderHistory = [];
      var alderTyping = false;
      var ALDER_WEBHOOK =
        "https://rooky-mumblingly-magda.ngrok-free.dev/webhook/chat";

      (async () => {
        var auth = await requireAuth(null);
        if (!auth) return;
        profile = auth.profile;
        var av = document.getElementById("topbar-avatar");
        if (profile.avatar_url) {
          av.innerHTML =
            '<img src="' +
            profile.avatar_url +
            '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">';
        } else {
          av.textContent = (profile.full_name || "?")[0].toUpperCase();
        }
        // Check URL param for direct request link
        var params = new URLSearchParams(window.location.search);
        var reqParam = params.get("req");
        await loadTab("requests");
        if (reqParam) {
          setTimeout(function () {
            openConversation(reqParam);
          }, 300);
        }
        // Realtime
        sb.channel("messages-page")
          .on(
            "postgres_changes",
            { event: "INSERT", schema: "public", table: "messages" },
            function (payload) {
              if (activeConvId && payload.new.request_id === activeConvId) {
                loadMessages(activeConvId);
              }
            },
          )
          .subscribe();
      })();

      async function switchTab(tab) {
        activeTab = tab;
        document.querySelectorAll(".msg-tab").forEach(function (t) {
          t.classList.remove("active");
        });
        document.getElementById("tab-" + tab).classList.add("active");
        activeConvId = null;
        await loadTab(tab);
      }

      async function loadTab(tab) {
        var list = document.getElementById("msg-list");
        list.innerHTML = '<div class="loading-spinner">Loading...</div>';

        if (tab === "alder") {
          list.innerHTML =
            '<div class="conv-empty" style="padding:24px 16px;text-align:center;color:var(--gray-500);font-size:13px;">&#129409; Alder is in the chat area &rarr;</div>';
          showAlderChat();
          return;
        }

        if (tab === "office") {
          list.innerHTML =
            '<div class="conv-item active" style="background:var(--green-light);" onclick="openOfficeChat()">' +
            '<div class="conv-avatar" style="background:var(--green-dark);color:white;font-size:18px;">&#127963;</div>' +
            '<div class="conv-info"><div class="conv-name">RPAS Office</div><div class="conv-service">General inquiries</div></div>' +
            "</div>";
          openOfficeChat();
          return;
        }

        // My Requests tab — load conversations per request
        var query = sb
          .from("service_requests")
          .select(
            "id, service_type, title, status, researcher:researcher_id(full_name,avatar_url), analyst:analyst_id(full_name,avatar_url)",
          )
          .order("created_at", { ascending: false });

        if (profile.role === "researcher")
          query = query.eq("researcher_id", profile.id);
        else if (profile.role === "analyst")
          query = query.eq("analyst_id", profile.id);

        var { data: requests } = await query;
        allConvs = requests || [];

        if (!allConvs.length) {
          list.innerHTML =
            '<div class="conv-empty">No request conversations yet.</div>';
          showEmptyState();
          return;
        }

        list.innerHTML = allConvs
          .map(function (r) {
            var other =
              profile.role === "researcher"
                ? r.analyst || {}
                : r.researcher || {};
            var name = other.full_name || "RPAS";
            var initials = name[0] ? name[0].toUpperCase() : "R";
            var avatar = other.avatar_url
              ? '<img src="' +
                other.avatar_url +
                '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">'
              : initials;
            var service = r.service_type || "Service request";
            var statusBg =
              {
                submitted: "#fef3c7",
                under_review: "#dbeafe",
                in_progress: "#d1fae5",
                for_revision: "#fee2e2",
                completed: "#d1fae5",
                cancelled: "#f3f4f6",
              }[r.status] || "#f3f4f6";
            return (
              '<button class="conv-item" id="conv-' +
              r.id +
              '" onclick="openConversation(\'' +
              r.id +
              "')\">" +
              '<div class="conv-avatar">' +
              avatar +
              "</div>" +
              '<div class="conv-info">' +
              '<div class="conv-name">' +
              name +
              "</div>" +
              '<div class="conv-service">' +
              service +
              "</div>" +
              '<div class="conv-preview" id="conv-preview-' +
              r.id +
              '">Loading...</div>' +
              "</div>" +
              '<div class="conv-meta"><div class="conv-time" id="conv-time-' +
              r.id +
              '"></div></div>' +
              "</button>"
            );
          })
          .join("");

        // Load latest message preview for each
        allConvs.forEach(function (r) {
          loadPreview(r.id);
        });
      }

      async function loadPreview(requestId) {
        var { data } = await sb
          .from("messages")
          .select("content,message,created_at")
          .eq("request_id", requestId)
          .order("created_at", { ascending: false })
          .limit(1);
        var el = document.getElementById("conv-preview-" + requestId);
        var tel = document.getElementById("conv-time-" + requestId);
        if (el)
          el.textContent =
            data && data[0]
              ? (data[0].content || data[0].message || "").substring(0, 40)
              : "No messages yet";
        if (tel && data && data[0])
          tel.textContent = timeAgo(data[0].created_at);
      }

      function showEmptyState() {
        document.getElementById("chat-area").innerHTML =
          '<div class="chat-empty-state"><div>&#128172;</div><p>Select a conversation to start messaging</p></div>';
      }

      async function openConversation(requestId) {
        activeConvId = requestId;
        document.querySelectorAll(".conv-item").forEach(function (el) {
          el.classList.remove("active");
        });
        var item = document.getElementById("conv-" + requestId);
        if (item) item.classList.add("active");
        var req = allConvs.find(function (r) {
          return r.id === requestId;
        });
        var other = req
          ? profile.role === "researcher"
            ? req.analyst || {}
            : req.researcher || {}
          : {};
        var name = other.full_name || "RPAS";
        var avatar = other.avatar_url
          ? '<img src="' +
            other.avatar_url +
            '" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">'
          : name[0].toUpperCase();
        var service = req ? req.service_type || "" : "";
        document.getElementById("chat-area").innerHTML =
          '<div class="chat-header">' +
          '<div class="chat-header-avatar">' +
          avatar +
          "</div>" +
          '<div class="chat-header-info"><h4>' +
          name +
          "</h4><span>" +
          service +
          "</span></div>" +
          "</div>" +
          '<div class="chat-messages" id="chat-messages"></div>' +
          '<div class="chat-input-bar">' +
          '<textarea id="msg-textarea" rows="1" placeholder="Type a message..." onkeydown="msgKeyDown(event)"></textarea>' +
          '<button class="chat-send-btn" onclick="sendMsg()" id="send-btn">&#10148;</button>' +
          "</div>";
        await loadMessages(requestId);
      }

      async function loadMessages(requestId) {
        var { data } = await sb
          .from("messages")
          .select("*")
          .eq("request_id", requestId)
          .order("created_at", { ascending: true });
        var container = document.getElementById("chat-messages");
        if (!container) return;
        var msgs = data || [];
        if (!msgs.length) {
          container.innerHTML =
            '<div style="text-align:center;color:var(--gray-400);font-size:13px;margin-top:30px;">No messages yet. Start the conversation!</div>';
          return;
        }
        var lastDate = null;
        container.innerHTML = msgs
          .map(function (m) {
            var isMine = m.sender_id === profile.id;
            var text = m.content || m.message || "";
            var date = new Date(m.created_at).toLocaleDateString("en-PH", {
              month: "long",
              day: "numeric",
            });
            var divider = "";
            if (date !== lastDate) {
              divider = '<div class="chat-date-divider">' + date + "</div>";
              lastDate = date;
            }
            var timeStr = new Date(m.created_at).toLocaleTimeString("en-PH", {
              hour: "2-digit",
              minute: "2-digit",
            });
            return (
              divider +
              '<div class="chat-msg-row ' +
              (isMine ? "mine" : "theirs") +
              '">' +
              '<div class="chat-msg-bubble">' +
              text +
              '<div class="chat-msg-time">' +
              timeStr +
              "</div></div>" +
              "</div>"
            );
          })
          .join("");
        container.scrollTop = container.scrollHeight;
      }

      async function sendMsg() {
        var ta = document.getElementById("msg-textarea");
        var btn = document.getElementById("send-btn");
        if (!ta || !activeConvId) return;
        var text = ta.value.trim();
        if (!text) return;
        btn.disabled = true;
        ta.value = "";
        await sb.from("messages").insert({
          request_id: activeConvId,
          sender_id: profile.id,
          content: text,
          message: text,
        });
        btn.disabled = false;
        await loadMessages(activeConvId);
      }

      function msgKeyDown(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMsg();
        }
      }

      function openOfficeChat() {
        activeConvId = "office";
        document.getElementById("chat-area").innerHTML =
          '<div class="chat-header">' +
          '<div class="chat-header-avatar" style="background:var(--green-dark);color:white;font-size:18px;">&#127963;</div>' +
          '<div class="chat-header-info"><h4>RPAS Office</h4><span>General inquiries — Admin will reply soon</span></div>' +
          "</div>" +
          '<div class="chat-messages" id="chat-messages"><div style="text-align:center;color:var(--gray-400);font-size:13px;margin-top:30px;">Send a message to the RPAS office.<br>An admin will reply as soon as possible.</div></div>' +
          '<div class="chat-input-bar">' +
          '<textarea id="msg-textarea" rows="1" placeholder="Message RPAS office..." onkeydown="msgKeyDown(event)"></textarea>' +
          '<button class="chat-send-btn" onclick="sendOfficeMsg()" id="send-btn">&#10148;</button>' +
          "</div>";
      }

      async function sendOfficeMsg() {
        var ta = document.getElementById("msg-textarea");
        if (!ta) return;
        var text = ta.value.trim();
        if (!text) return;
        ta.value = "";
        // Insert notification for all admins
        var { data: admins } = await sb
          .from("profiles")
          .select("id")
          .eq("role", "admin")
          .eq("status", "approved");
        var notifs = (admins || []).map(function (a) {
          return {
            user_id: a.id,
            message:
              (profile.full_name || "A user") +
              ' sent a general inquiry: "' +
              text.substring(0, 60) +
              '"',
            type: "message",
          };
        });
        if (notifs.length) await sb.from("notifications").insert(notifs);
        var el = document.getElementById("chat-messages");
        if (el)
          el.innerHTML +=
            '<div class="chat-msg-row mine"><div class="chat-msg-bubble">' +
            text +
            "</div></div>";
        el.scrollTop = el.scrollHeight;
      }

      // ---- ALDER THE LION ----
      var alderGreeting =
        "Hi! I'm Alder, your RPAS assistant 🦁 I can answer questions about our services, check your request status, or connect you with the admin. What can I help you with today?";

      function showAlderChat() {
        document.getElementById("chat-area").innerHTML =
          '<div class="alder-tab-header">' +
          '<div class="alder-tab-avatar">' +
          '<img src="/assets/Alder/alder-head.png" style="width:44px;height:auto;display:block;" alt="Alder">' +
          "</div>" +
          '<div><h4 style="font-size:15px;font-weight:700;">Alder</h4><span style="font-size:12px;color:var(--gray-500);">RPAS AI Assistant &bull; ACI</span></div>' +
          "</div>" +
          '<div class="chat-messages" id="alder-msgs-full"></div>' +
          '<div class="chat-input-bar">' +
          '<textarea id="alder-input-full" rows="1" placeholder="Ask Alder anything..." onkeydown="alderKeyFull(event)"></textarea>' +
          '<button class="chat-send-btn" onclick="sendAlderFull()" id="alder-send-full">&#10148;</button>' +
          "</div>";
        if (alderHistory.length === 0) addAlderFull("bot", alderGreeting);
        else renderAlderFull();
      }

      function addAlderFull(role, text) {
        alderHistory.push({ role: role, text: text });
        renderAlderFull();
      }

      function renderAlderFull() {
        var container = document.getElementById("alder-msgs-full");
        if (!container) return;
        container.innerHTML = alderHistory
          .map(function (m) {
            if (m.role === "bot")
              return (
                '<div class="chat-msg-row theirs"><div class="chat-msg-bubble">' +
                m.text +
                "</div></div>"
              );
            return (
              '<div class="chat-msg-row mine"><div class="chat-msg-bubble">' +
              m.text +
              "</div></div>"
            );
          })
          .join("");
        if (alderTyping)
          container.innerHTML +=
            '<div class="chat-msg-row theirs"><div class="chat-msg-bubble"><span style="color:var(--gray-400);">Alder is thinking...</span></div></div>';
        container.scrollTop = container.scrollHeight;
      }

      async function sendAlderFull() {
        var input = document.getElementById("alder-input-full");
        var btn = document.getElementById("alder-send-full");
        if (!input || alderTyping) return;
        var text = input.value.trim();
        if (!text) return;
        input.value = "";
        addAlderFull("user", text);
        alderTyping = true;
        btn.disabled = true;
        renderAlderFull();
        try {
          var resp = await fetch(ALDER_WEBHOOK, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              message: text,
              userId: profile.id,
              userRole: profile.role,
              userName: profile.full_name || "User",
              history: alderHistory.slice(-6),
            }),
          });
          var data = await resp.json();
          var reply =
            data.reply ||
            data.message ||
            data.text ||
            "Sorry, I didn't get a response. Please try again.";
          alderTyping = false;
          btn.disabled = false;
          addAlderFull("bot", reply);
        } catch (err) {
          alderTyping = false;
          btn.disabled = false;
          addAlderFull(
            "bot",
            "I'm having trouble connecting right now. Please message the RPAS office directly or try again soon.",
          );
        }
      }

      function alderKeyFull(e) {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendAlderFull();
        }
      }
    </script>
